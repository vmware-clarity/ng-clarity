name: Figma Token Sync

on:
  # Triggered by the Cloudflare Worker when Figma publishes the library
  repository_dispatch:
    types: [figma-tokens-updated]

  # Allow manual trigger with an optional file key override
  workflow_dispatch:
    inputs:
      figma_file_key:
        description: 'Figma file key (overrides the FIGMA_FILE_KEY secret)'
        required: false
        type: string

concurrency:
  group: figma-sync
  cancel-in-progress: true

jobs:
  sync-tokens:
    name: Extract & Transform Figma Tokens
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Style Dictionary
        # Install separately so the main CI lockfile stays clean.
        # style-dictionary v4 requires Node 18+ (this repo requires Node 24+).
        run: npm install --no-save style-dictionary@^4

      # ── Phase 1: Extract Figma variables ─────────────────────────────────────
      - name: Extract Figma variables to DTCG JSON
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ inputs.figma_file_key || secrets.FIGMA_FILE_KEY }}
        run: node scripts/figma-extract.mjs

      # ── Phase 2: Sanitise token keys ─────────────────────────────────────────
      - name: Clean token files (strip invalid $ prefixes)
        run: node scripts/clean-tokens.mjs

      # ── Phase 3: Run Style Dictionary ────────────────────────────────────────
      - name: Build CSS Custom Properties via Style Dictionary
        run: node --experimental-vm-modules style-dictionary.config.mjs

      # ── Phase 4: Diff check ───────────────────────────────────────────────────
      - name: Check for token changes
        id: diff
        run: |
          git add tokens/ projects/angular/styles/core/tokens/_figma-tokens.light.scss projects/angular/styles/core/tokens/_figma-tokens.dark.scss
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ  No token changes detected — skipping PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Phase 5: Create PR ───────────────────────────────────────────────────
      - name: Create branch and commit
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="figma-sync/tokens-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -m "chore(tokens): sync design tokens from Figma

          Triggered by: ${{ github.event_name }}
          Figma file: ${{ inputs.figma_file_key || secrets.FIGMA_FILE_KEY }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push origin "$BRANCH"

      - name: Open Pull Request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore(tokens): sync design tokens from Figma [$(date +%Y-%m-%d)]" \
            --body "$(cat <<'EOF'
          ## Figma Design Token Sync

          This PR was automatically generated by the [figma-sync workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) after a **LIBRARY_PUBLISH** event in Figma.

          ### What changed

          | File | Description |
          |------|-------------|
          | `tokens/global/colors.json` | Global colour palette (DTCG format) |
          | `tokens/global/spacing.json` | Spacing scale |
          | `tokens/global/typography.json` | Typography primitives |
          | `tokens/themes/light.json` | Light mode semantic overrides |
          | `tokens/themes/dark.json` | Dark mode semantic overrides |
          | `projects/angular/styles/core/tokens/_figma-tokens.light.scss` | Compiled CSS Custom Properties (`:root`) |
          | `projects/angular/styles/core/tokens/_figma-tokens.dark.scss` | Compiled CSS Custom Properties (`[cds-theme~='dark']`) |

          ### Review checklist

          - [ ] Colour values look correct in the light and dark token files
          - [ ] No unexpected token renames (would be breaking changes)
          - [ ] `_figma-tokens.light.css` and `_figma-tokens.dark.css` compile without errors
          - [ ] Visual regression tests pass

          > **Note:** Merge only after a designer and an engineer have reviewed the diff.
          EOF
          )" \
            --base main \
            --head "$BRANCH" \
            --label "tokens" \
            --label "automated"
