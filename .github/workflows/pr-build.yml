name: PR Build
on:
  pull_request:
concurrency:
  group: pr-build-${{github.event.pull_request.number}}
  cancel-in-progress: true
jobs:
  pr-build:
    name: PR Build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
      - name: Install Dependencies
        run: npm ci --ignore-scripts
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Generate Website Sitemap
        run: node ./projects/website/scripts/generate-sitemap.js
      - name: Configure Website CMS
        run: node ./projects/website/scripts/configure-cms-for-github.js --repo $GITHUB_REPOSITORY --branch $GITHUB_HEAD_REF
      - name: Test
        run: npm run test
      - name: Public Api Check
        run: npm run public-api:check
      - name: Upload Docs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: dist/docs/
      - name: Upload Website Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: dist/website/
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  pr-visual-regression-test:
    name: PR Visual Regression Test
    timeout-minutes: 40
    runs-on: ubuntu-latest
    env:
      APPLITOOLS_API_KEY: ${{secrets.APPLITOOLS_API_KEY}}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
      - name: Install Dependencies
        run: npm ci --ignore-scripts
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Build Storybook
        run: npm run _build:storybook
      - name: Visual Regression Test
        run: npm run _visual-test:run
