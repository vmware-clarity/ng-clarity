<td colspan="2" class="pv-message-container left" role="presentation">
  <span class="pv-message-content">
    <span *ngIf="data.icon" class="pv-message-icon" [attr.aria-hidden]="true" [ngClass]="data.icon"></span>
    <span
      *ngIf="!data.renderAsHtml"
      class="pv-message-text"
      [attr.aria-label]="data.text"
      [innerText]="data.text"
    ></span>
    <span
      *ngIf="data.renderAsHtml"
      class="pv-message-text"
      [attr.aria-label]="data.text"
      [innerHtml]="data.text"
    ></span>
  </span>
</td>
