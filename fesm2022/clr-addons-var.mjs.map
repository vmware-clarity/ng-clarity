<div class="pr-1 clr-flex-grow-0 clr-flex-shrink-0">
  <span *ngIf="description">{{ description }}</span>
  <appfx-validation-banner
    *ngIf="step.modelInstance?.validationState?.isEmpty() === false"
    [state]="step.modelInstance?.validationState"
  >
  </appfx-validation-banner>
</div>
<div class="content-container clr-flex-column clr-flex-grow-1 clr-flex-shrink-1">
  <ng-template #componentContainer> </ng-template>
</div>
