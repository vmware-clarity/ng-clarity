<section class="overlay-spinner" *ngIf="!isModal; else spinner">
  <ng-template [ngTemplateOutlet]="spinner"></ng-template>
</section>

<ng-template #spinner>
  <clr-spinner>
    {{ message }}
  </clr-spinner>
  <span [attr.aria-live]="politeness" class="clr-sr-only">
    {{ message }}
  </span>

  <span *ngIf="progressDetails" class="progress-item" aria-live="polite">
    {{ progressDetails }}
  </span>

  <button *ngIf="showActionButton" class="btn btn-link btn-sm" (click)="invokeAction()">
    {{ actionButtonLabel }}
  </button>
</ng-template>
