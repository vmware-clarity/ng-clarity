<div class="clr-row toggle-header">
  <label class="toggle-label" for="{{ toggleId }}">{{ label }}</label>
  <clr-checkbox-wrapper>
    <input
      type="checkbox"
      clrToggle
      id="{{ toggleId }}"
      [(ngModel)]="toggleState"
      (ngModelChange)="onToggleStateChanged(toggleState)"
      [attr.disabled]="disabled"
    />
  </clr-checkbox-wrapper>
</div>
