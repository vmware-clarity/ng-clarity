@if (panel | async; as panel) {
<div [ngClass]="getPanelStateClasses(panel)">
  <div class="clr-stepper-header">
    <button
      type="button"
      class="clr-stepper-header-button"
      (click)="togglePanel()"
      [id]="getHeaderId(panel.templateId)"
      [attr.aria-disabled]="panel.disabled"
      [attr.aria-controls]="getContentId(panel.templateId)"
      [attr.aria-expanded]="panel.open"
      [class.clr-stepper-header-has-description]="(stepDescription.changes | async)?.length || stepDescription.length"
      #headerButton
    >
      <span class="clr-step-status">
        <cds-icon shape="angle" direction="right" class="clr-stepper-angle clr-step-angle"></cds-icon>
        <span class="clr-step-status-icon">
          @if (panel.status === PanelStatus.Error) {
          <cds-icon status="danger" shape="exclamation-circle" class="clr-step-error-icon"></cds-icon>
          } @if (panel.status === PanelStatus.Complete) {
          <cds-icon status="success" shape="check-circle" class="clr-step-complete-icon"></cds-icon>
          }
        </span>
      </span>
      <span class="clr-step-title-wrapper">
        <span class="clr-step-number">{{panelNumber}}.</span>
        <ng-content select="clr-step-title"></ng-content>
      </span>
      <ng-content select="clr-step-description"></ng-content>
    </button>
    <div class="clr-sr-only" role="status">
      @if (panel.status === PanelStatus.Error) { {{ stepErrorText(panelNumber)}} } @if (panel.status ===
      PanelStatus.Complete) { {{ stepCompleteText(panelNumber)}} }
    </div>
  </div>
  <div
    @skipInitialRender
    role="region"
    class="clr-stepper-content-region"
    [id]="getContentId(panel.templateId)"
    [attr.aria-hidden]="!panel.open"
    [attr.aria-labelledby]="getHeaderId(panel.templateId)"
  >
    @if (panel.open) {
    <div @toggle (@toggle.done)="collapsePanelOnAnimationDone(panel)" class="clr-stepper-content">
      <div class="clr-stepper-inner-content">
        <ng-content></ng-content>
      </div>
    </div>
    }
  </div>
</div>
}
