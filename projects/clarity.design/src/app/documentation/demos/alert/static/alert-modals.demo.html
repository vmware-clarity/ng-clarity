<div class="clr-example">
  <div class="backdrop-example-container">
    <div class="modal static bump-down">
      <div class="modal-dialog" role="dialog">
        <div class="modal-content">
          <div class="modal-header">
            <button aria-label="Close" class="close" type="button">
              <cds-icon aria-hidden="true" shape="times"></cds-icon>
            </button>
            <div class="modal-title">I have a nice title</div>
          </div>
          <div class="modal-body">
            <div class="alert alert-danger">
              <div class="alert-items">
                <div class="alert-item static">
                  <div class="alert-icon-wrapper">
                    <cds-icon class="alert-icon" shape="error-standard"></cds-icon>
                  </div>
                  <span class="alert-text"> Alert in a modal. </span>
                </div>
              </div>
            </div>
            <p cds-text="body" class="clr-mt-16px">But not much to say...</p>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline" type="button">Cancel</button>
            <button class="btn btn-primary" type="button">Ok</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-backdrop static" aria-hidden="true"></div>
  </div>
</div>
<app-stackblitz-example name="alerts in modals" [componentTemplate]="htmlExample"></app-stackblitz-example>
