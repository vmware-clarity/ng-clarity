<clr-combobox-container>
  <label>My State</label>
  <clr-combobox [(ngModel)]="selection" name="myState">
    <clr-options>
      <clr-option *clrOptionItems="let state of states; field: 'name'" [clrValue]="state">
        <cds-icon shape="world" role="img" aria-label="World is turning"></cds-icon> {{ state.name }}
        <cds-icon shape="sun" role="img" aria-label="Sun is shining"></cds-icon>
      </clr-option>
    </clr-options>
  </clr-combobox>
  <clr-control-helper>Which state do you live in?</clr-control-helper>
  <clr-control-error>There was an error</clr-control-error>
</clr-combobox-container>

<app-stackblitz-example
  name="single selection combobox"
  [componentTemplate]="basicHTML"
  [componentClass]="basicComponent"
  [additionalFiles]="additionalFiles"
></app-stackblitz-example>
