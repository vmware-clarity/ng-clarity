<div ngNonBindable class="clr-example squeeze demo-menu-height">
  <div class="dropdown open">
    <button class="dropdown-toggle btn btn-link">
      Dropdown Toggle
      <cds-icon shape="angle" direction="down"></cds-icon>
    </button>
    <div class="dropdown-menu" role="menu">
      <label class="dropdown-header" aria-hidden="true">Dropdown header</label>
      <div aria-label="Dropdown header Lorem" class="dropdown-item" role="menuitem">Lorem.</div>
      <div aria-label="Dropdown header Lorem ipsum" class="dropdown-item" role="menuitem">Lorem ipsum.</div>
      <div aria-label="Dropdown header Lorem ipsum dolor" class="dropdown-item" role="menuitem">Lorem ipsum dolor.</div>
      <div class="dropdown-divider" role="separator" aria-hidden="true"></div>
      <div class="dropdown-item" role="menuitem">Link</div>
    </div>
  </div>
</div>
<app-stackblitz-example
  name="static dropdown link button trigger"
  [componentTemplate]="example"
></app-stackblitz-example>
