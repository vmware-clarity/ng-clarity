<div ngNonBindable class="clr-example squeeze demo-menu-height">
  <div class="dropdown bottom-right open">
    <button class="dropdown-toggle btn btn-primary">
      Dropdown
      <cds-icon shape="angle" direction="down"></cds-icon>
    </button>
    <div class="dropdown-menu" role="menu">
      <label class="dropdown-header" aria-hidden="true">Dropdown header</label>
      <div class="dropdown-item active" role="menuitem">First Action</div>
      <div class="dropdown-item disabled" role="menuitem" aria-disabled="true">Disabled Action</div>
      <div class="dropdown-divider" role="separator" aria-hidden="true"></div>
      <div class="dropdown-item" role="menuitem">Link 1</div>
      <div class="dropdown-item" role="menuitem">Link 2</div>
    </div>
  </div>
</div>
<app-stackblitz-example name="static dropdown position" [componentTemplate]="example"></app-stackblitz-example>
