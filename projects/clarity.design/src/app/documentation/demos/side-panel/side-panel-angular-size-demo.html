<p>
  <button class="btn btn-primary" (click)="small = true">Small side panel</button>
  <button class="btn btn-primary" (click)="large = true">Large side panel</button>
  <button class="btn btn-primary" (click)="extraLarge = true">Extra large side panel</button>
  <button class="btn btn-primary" (click)="fullScreen = true">Full-Screen side panel</button>
</p>

<clr-side-panel [(clrSidePanelOpen)]="small" [clrSidePanelSize]="'sm'">
  <div class="side-panel-title">Small side panel</div>
  <div class="side-panel-body">I am a small side panel.</div>
  <div class="side-panel-footer">
    <button type="button" class="btn btn-primary" (click)="small = false">Ok</button>
  </div>
</clr-side-panel>

<clr-side-panel [(clrSidePanelOpen)]="large" [clrSidePanelSize]="'lg'">
  <div class="side-panel-title">Large side panel</div>
  <div class="side-panel-body">I am a large side panel.</div>
  <div class="side-panel-footer">
    <button type="button" class="btn btn-outline" (click)="large = false">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="large = false">Ok</button>
  </div>
</clr-side-panel>

<clr-side-panel [(clrSidePanelOpen)]="extraLarge" [clrSidePanelSize]="'xl'">
  <div class="side-panel-title">Extra large side panel</div>
  <div class="side-panel-body">I am an extra large side panel.</div>
  <div class="side-panel-footer">
    <button type="button" class="btn btn-outline" (click)="extraLarge = false">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="extraLarge = false">Ok</button>
  </div>
</clr-side-panel>

<clr-side-panel [(clrSidePanelOpen)]="fullScreen" [clrSidePanelSize]="'full-screen'">
  <div class="side-panel-title">Full-Screen side panel</div>
  <div class="side-panel-body">I am a full-screen side panel.</div>
  <div class="side-panel-footer">
    <button type="button" class="btn btn-outline" (click)="fullScreen = false">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="fullScreen = false">Ok</button>
  </div>
</clr-side-panel>

<app-stackblitz-example
  name="Side panel Angular size"
  [componentTemplate]="example"
  [componentClass]="exampleTs"
  [showComponentClass]="false"
></app-stackblitz-example>
