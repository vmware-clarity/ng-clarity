<div class="clr-example">
  <clr-tabs>
    <clr-tab>
      <button clrTabLink>Dashboard</button>
      <clr-tab-content *clrIfActive>
        <p cds-text="body" class="clr-mt-16px">
          Content for Dashboard tab. Here is a <a href="javascript://">link</a> that can be accessed via clicking or
          through keyboard via tabbing.
        </p>
      </clr-tab-content>
    </clr-tab>
    <clr-tab>
      <button clrTabLink>Management</button>
      <clr-tab-content *clrIfActive>
        <p cds-text="body" class="clr-mt-16px">Content for Management tab.</p>
      </clr-tab-content>
    </clr-tab>
    <clr-tab>
      <button clrTabLink [clrTabLinkInOverflow]="inOverflow">Cloud</button>
      <clr-tab-content *clrIfActive>
        <p cds-text="body" class="clr-mt-16px">Content for Cloud tab.</p>
      </clr-tab-content>
    </clr-tab>
    <clr-tab>
      <button clrTabLink [clrTabLinkInOverflow]="inOverflow">Settings</button>
      <clr-tab-content *clrIfActive>
        <p cds-text="body" class="clr-mt-16px">Content for Settings tab.</p>
      </clr-tab-content>
    </clr-tab>
  </clr-tabs>
</div>
<app-stackblitz-example name="tabs angular overflow example" [componentTemplate]="example"></app-stackblitz-example>
