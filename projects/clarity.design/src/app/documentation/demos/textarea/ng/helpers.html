<form clrForm>
  <clr-textarea-container>
    <label>Label</label>
    <textarea clrTextarea [(ngModel)]="description" name="description" required></textarea>
    <clr-control-helper>Please provide a description.</clr-control-helper>
    <clr-control-error *clrIfError="'required'">You must provide a description!</clr-control-error>
  </clr-textarea-container>
</form>
