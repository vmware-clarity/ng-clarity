<clr-toggle-container>
  <label>Full toggle switch</label>
  <clr-toggle-wrapper>
    <input type="checkbox" clrToggle name="options" required value="option1" [(ngModel)]="options.one" />
    <label>Option 1</label>
  </clr-toggle-wrapper>
  <clr-toggle-wrapper>
    <input type="checkbox" clrToggle name="options" required value="option2" [(ngModel)]="options.two" />
    <label>Option 2</label>
  </clr-toggle-wrapper>
  <clr-control-helper>Helper text</clr-control-helper>
  <clr-control-error>This field is required!</clr-control-error>
</clr-toggle-container>
