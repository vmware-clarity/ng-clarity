<clr-tree>
  <clr-tree-node *ngFor="let group of userPriveleges" [(clrSelected)]="group.selected" [clrExpanded]="true">
    {{ group.name }}
    <clr-tree-node *ngFor="let item of group.items" [(clrSelected)]="item.selected">
      {{ item.name }}
      <clr-tree-node *ngFor="let innerItem of item.items" [(clrSelected)]="innerItem.selected">
        {{ innerItem.name }}
      </clr-tree-node>
    </clr-tree-node>
  </clr-tree-node>
</clr-tree>
