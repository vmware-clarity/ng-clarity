<clr-tree *ngIf="root$ | async; let files" [clrLazy]="true">
  <clr-tree-node *clrRecursiveFor="let file of files; getChildren: getChildren" [clrExpandable]="file.isFolder">
    <cds-icon [attr.shape]="file.isFolder ? 'folder' : 'file'"></cds-icon>
    {{ file.name }}
  </clr-tree-node>
</clr-tree>

<app-stackblitz-example
  name="lazy loading recursive tree"
  [componentTemplate]="exampleHtml"
  [componentClass]="exampleTs"
  [additionalFiles]="additionalFiles"
></app-stackblitz-example>
