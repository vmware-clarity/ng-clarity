<clr-tree>
  <clr-tree-node [clrExpanded]="true">
    <cds-icon [attr.shape]="'folder-open'"></cds-icon>
    Desktop
    <clr-tree-node [clrExpanded]="false" [clrLoading]="loading">
      <cds-icon [attr.shape]="'folder-open'"></cds-icon>
      Applications
      <ng-template clrIfExpanded (clrIfExpandedChange)="$event ? fetchApps() : null">
        <clr-tree-node *ngFor="let app of apps$ | async">
          <cds-icon [attr.shape]="'file'"></cds-icon>{{ app }}
        </clr-tree-node>
      </ng-template>
    </clr-tree-node>
    <clr-tree-node [clrExpanded]="true">
      <cds-icon [attr.shape]="'folder-open'"></cds-icon>
      Files
      <clr-tree-node>
        <cds-icon [attr.shape]="'file'"></cds-icon>
        Cover-Letter.dox
      </clr-tree-node>
      <clr-tree-node>
        <cds-icon [attr.shape]="'file'"></cds-icon>
        notes.txt
      </clr-tree-node>
      <clr-tree-node>
        <cds-icon [attr.shape]="'file'"></cds-icon>
        Resume.doc
      </clr-tree-node>
    </clr-tree-node>
  </clr-tree-node>
</clr-tree>
