<div class="clr-example" style="margin-top: 0">
  <div class="main-container" style="width: 240px; margin: 12px auto; height: 408px">

      <clr-vertical-nav [clrVerticalNavCollapsible]="true" [clrVerticalNavCollapsed]="demoCollapsed">
        <a clrVerticalNavLink href="javascript://">
          <cds-icon *ngIf="!demoHideIcons" shape="user" clrVerticalNavIcon></cds-icon>

        </a>
        <a clrVerticalNavLink href="javascript://" class="active">
          <cds-icon *ngIf="!demoHideIcons" shape="flame" clrVerticalNavIcon></cds-icon>

        <a clrVerticalNavLink href="javascript://">
          <cds-icon *ngIf="!demoHideIcons" shape="bug" clrVerticalNavIcon></cds-icon>

        </a>
        <a clrVerticalNavLink href="javascript://">
          <cds-icon *ngIf="!demoHideIcons" shape="block" clrVerticalNavIcon></cds-icon>

        </a>
        <a clrVerticalNavLink href="javascript://">
          <cds-icon *ngIf="!demoHideIcons" shape="shield" clrVerticalNavIcon></cds-icon>
          Fighting
        </a>
        <a clrVerticalNavLink href="javascript://">
