<h1>Stepper Addon Demo</h1>

<div *ngIf="!done">
  <appfx-stepper [steps]="steps" [wizardModel]="model" (onFinish)="onFinish()"></appfx-stepper>
</div>

<div *ngIf="done" class="clr-mt-24px">
  <div class="alert alert-success">
    <div class="alert-items">
      <div class="alert-item static">
        <span class="alert-text">
          Project <strong>{{ model.name.value }}</strong> assigned to <strong>{{ model.team.value }}</strong>.
        </span>
      </div>
    </div>
  </div>
  <button class="btn clr-mt-16px" (click)="reset()">Reset</button>
</div>
