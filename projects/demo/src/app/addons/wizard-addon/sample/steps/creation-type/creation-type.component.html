<clr-radio-container>
  <clr-radio-wrapper>
    <input
      type="radio"
      clrRadio
      name="creationType"
      [value]="CreationType.newVM"
      [(ngModel)]="model.creationType.value"
    />
    <label>Create a new virtual machine</label>
  </clr-radio-wrapper>
  <clr-radio-wrapper>
    <input
      type="radio"
      clrRadio
      name="creationType"
      [value]="CreationType.cloneExistingVM"
      [(ngModel)]="model.creationType.value"
    />
    <label>Clone an existing virtual machine</label>
  </clr-radio-wrapper>
</clr-radio-container>
