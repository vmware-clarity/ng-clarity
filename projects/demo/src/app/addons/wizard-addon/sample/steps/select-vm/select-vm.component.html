<clr-tree>
  <clr-tree-node [clrExpanded]="true">
    <cds-icon shape="folder-open"></cds-icon>
    vcenter.example.com

    <clr-tree-node [clrExpanded]="true">
      <cds-icon shape="building"></cds-icon>
      Datacenter

      <clr-tree-node>
        <button
          class="clr-treenode-link"
          [class.active]="isNodeSelected('vm-10')"
          (click)="selectNode('vm-10', 'Prod-VM 10')"
        >
          <cds-icon shape="vm"></cds-icon> Prod-VM 10
        </button>
      </clr-tree-node>

        <button
          class="clr-treenode-link"

        </button>
      </clr-tree-node>
      <clr-tree-node>
        <button
          class="clr-treenode-link"
          [class.active]="isNodeSelected('vm-12')"
          (click)="selectNode('vm-12', 'Prod-VM 12')"
        >
          <cds-icon shape="vm"></cds-icon> Prod-VM 12
        </button>
      </clr-tree-node>
      <clr-tree-node>
        <button
          class="clr-treenode-link"

      </clr-tree-node>
