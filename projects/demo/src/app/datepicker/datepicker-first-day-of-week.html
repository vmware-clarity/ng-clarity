<h4>Configurable First Day of Week</h4>

<p>Use the input below to override the first day of the week (0 = Sunday, 1 = Monday, ..., 6 = Saturday).</p>

<div class="clr-row">
  <div class="clr-col-4">
    <clr-number-input-container>
      <label>First day of week (0-6)</label>
      <input
        clrNumberInput
        type="number"
        min="0"
        max="6"
        [value]="firstDayOfWeek ?? ''"
        (input)="onFirstDayChange($any($event.target).value)"
        placeholder="Locale default"
        style="min-width: 150px"
      />
      <clr-control-helper>Leave empty for locale default</clr-control-helper>
    </clr-number-input-container>
  </div>
</div>

<p>Calendar starts on: <strong>{{ firstDayLabel }}</strong></p>

<clr-date-container [clrFirstDayOfWeek]="firstDayOfWeek">
  <label>Pick a date</label>
  <input type="text" clrDate />
</clr-date-container>
