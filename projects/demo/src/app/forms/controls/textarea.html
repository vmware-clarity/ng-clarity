<h2>Text Input</h2>

<form class="clr-form">
  <div class="clr-form-control">
    <label for="basic" class="clr-control-label">Basic</label>
    <div class="clr-control-container">
      <div class="clr-textarea-wrapper">
        <textarea id="basic" rows="5" placeholder="Enter value here" class="clr-textarea"></textarea>
      </div>
      <div class="clr-subtext-wrapper">
        <cds-icon class="clr-validate-icon" shape="error-standard" status="danger"></cds-icon>
        <span class="clr-subtext">Helper Text</span>
      </div>
    </div>
  </div>

  <div class="clr-form-control">
    <label for="error" class="clr-control-label">Error state</label>
    <div class="clr-control-container clr-error">
      <div class="clr-textarea-wrapper">
        <textarea id="error" rows="5" placeholder="Enter value here" class="clr-textarea"></textarea>
      </div>
      <div class="clr-subtext-wrapper">
        <cds-icon class="clr-validate-icon" shape="error-standard" status="danger"></cds-icon>
        <span class="clr-subtext error">Helper Text</span>
      </div>
    </div>
  </div>

  <div class="clr-form-control clr-form-control-disabled">
    <label for="disabled" class="clr-control-label">Disabled state</label>
    <div class="clr-control-container">
      <div class="clr-textarea-wrapper">
        <textarea id="disabled" disabled rows="5" placeholder="Enter value here" class="clr-textarea"></textarea>
      </div>
      <div class="clr-subtext-wrapper">
        <cds-icon class="clr-validate-icon" shape="error-standard" status="danger"></cds-icon>
        <span class="clr-subtext">Helper Text</span>
      </div>
    </div>
  </div>
</form>
