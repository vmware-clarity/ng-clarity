<div class="clr-form-control">
  <label class="clr-control-label">Basic checkbox</label>
  <div class="clr-control-container clr-error">
    <div class="clr-checkbox-wrapper">
      <input type="checkbox" id="error-checkbox1" name="checkbox-error-1" value="option1" class="clr-checkbox" />
      <label for="error-checkbox1" class="clr-control-label">option 1</label>
    </div>
    <div class="clr-checkbox-wrapper">
      <input type="checkbox" id="error-checkbox2" name="checkbox-error-2" value="option2" class="clr-checkbox" />
      <label for="error-checkbox2" class="clr-control-label">option 2</label>
    </div>
    <div class="clr-checkbox-wrapper">
      <input type="checkbox" id="error-checkbox3" name="checkbox-error-3" value="option3" class="clr-checkbox" />
      <label for="error-checkbox3" class="clr-control-label">option 3</label>
    </div>
    <div class="clr-subtext-wrapper">
      <clr-icon class="clr-validate-icon" shape="exclamation-circle"></clr-icon>
      <span class="clr-subtext">Error message</span>
    </div>
  </div>
</div>
