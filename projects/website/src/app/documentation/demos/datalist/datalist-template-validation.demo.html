<button class="btn btn-sm btn-primary" (click)="disabled = !disabled">Toggle Disabled</button>
<form clrForm>
  <clr-datalist-container>
    <label>{{ disabled ? 'Disabled' : 'Enabled' }}</label>
    <input minlength="4" name="Option" required clrDatalistInput [disabled]="disabled" [(ngModel)]="value" />
    <datalist>
      @for (item of items; track item) {
      <option [value]="item"></option>
      }
    </datalist>
    <clr-control-helper>Helper text</clr-control-helper>
    <clr-control-error>There was an error</clr-control-error>
  </clr-datalist-container>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>

<app-stackblitz-example
  name="datalist with template validation"
  [componentTemplate]="templateHTML"
  [componentClass]="templateTS"
></app-stackblitz-example>
