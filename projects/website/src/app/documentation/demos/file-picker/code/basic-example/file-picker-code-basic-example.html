<h2 id="basic-example" cds-text="title" cds-layout="m-t:xxl">Basic Example</h2>

<p cds-text="body" cds-layout="m-t:md">
  This example allows multiple files to be selected. You can remove the <code cds-text="code">multiple</code> attribute
  to allow only a single file to be selected.
</p>

<form clrForm clrLayout="vertical" [formGroup]="form">
  <clr-file-input-container>
    <label>Label</label>
    <input type="file" formControlName="files" multiple required clrFileInput />
    <clr-control-helper>Helper message</clr-control-helper>
    <clr-control-success>Success message</clr-control-success>
    <clr-control-error>Error message</clr-control-error>
  </clr-file-input-container>
</form>

<app-stackblitz-example
  name="basic file picker"
  [componentTemplate]="componentTemplate"
  [componentClass]="componentClass"
>
</app-stackblitz-example>
