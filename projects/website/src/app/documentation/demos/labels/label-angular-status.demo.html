<div class="clr-example">
  <h6>Outlined</h6>
  <clr-label clrColor="danger" clrText="Austin" clrBadgeText="15" [clrClickable]="true"></clr-label>
  <clr-label clrColor="info" clrText="New York" clrBadgeText="33" [clrClickable]="true"></clr-label>
  <clr-label clrColor="success" clrText="Palo Alto" clrBadgeText="99+" [clrClickable]="true"></clr-label>
  <clr-label clrColor="warning" clrText="San Francisco" clrBadgeText="67" [clrClickable]="true"></clr-label>
  <clr-label
    clrColor="warning"
    clrText="Disabled"
    clrBadgeText="67"
    [clrClickable]="true"
    [clrDisabled]="true"
  ></clr-label>

  <h6>Solid</h6>
  <clr-label clrColor="danger" clrText="Austin" clrBadgeText="15" [clrClickable]="true"></clr-label>
  <clr-label clrColor="info" clrText="New York" clrBadgeText="33" [clrClickable]="true"></clr-label>
  <clr-label clrColor="success" clrText="Palo Alto" clrBadgeText="99+" [clrClickable]="true"></clr-label>
  <clr-label
    clrColor="warning"
    clrType="solid"
    clrText="San Francisco"
    clrBadgeText="67"
    [clrClickable]="true"
  ></clr-label>
  <clr-label
    clrColor="warning"
    clrType="solid"
    clrText="Disabled"
    clrBadgeText="67"
    [clrClickable]="true"
    [clrDisabled]="true"
  ></clr-label>
</div>
<app-stackblitz-example name="angular default labels" [componentTemplate]="htmlExample"></app-stackblitz-example>
