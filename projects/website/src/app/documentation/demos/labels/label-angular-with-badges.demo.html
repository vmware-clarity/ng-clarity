<div class="clr-example">
  <h6>Outlined</h6>
  <clr-label clrText="Austin" clrColor="purple" clrBadgeText="1" [clrClickable]="true"></clr-label>
  <clr-label clrText="New York" clrColor="blue" clrBadgeText="2" [clrClickable]="true"></clr-label>
  <clr-label clrText="Palo Alto" clrColor="orange" clrBadgeText="3" [clrClickable]="true"></clr-label>
  <clr-label clrText="San Francisco" clrColor="light-blue" clrBadgeText="12" [clrClickable]="true"></clr-label>
  <clr-label clrText="Seattle" clrBadgeText="15" [clrClickable]="true"></clr-label>
  <clr-label clrText="Disabled" clrBadgeText="15" [clrClickable]="true" [clrDisabled]="true"></clr-label>
  <h6>Solid</h6>
  <clr-label clrText="Austin" clrColor="purple" clrBadgeText="1" [clrType]="'solid'" [clrClickable]="true"></clr-label>
  <clr-label clrText="New York" clrColor="blue" clrBadgeText="2" [clrType]="'solid'" [clrClickable]="true"></clr-label>
  <clr-label
    clrText="Palo Alto"
    clrColor="orange"
    clrBadgeText="3"
    [clrType]="'solid'"
    [clrClickable]="true"
  ></clr-label>
  <clr-label
    clrText="San Francisco"
    clrColor="light-blue"
    clrBadgeText="12"
    [clrType]="'solid'"
    [clrClickable]="true"
  ></clr-label>
  <clr-label clrText="Seattle" clrBadgeText="15" [clrType]="'solid'" [clrClickable]="true"></clr-label>
  <clr-label
    clrText="Disabled"
    clrBadgeText="15"
    [clrType]="'solid'"
    [clrClickable]="true"
    [clrDisabled]="true"
  ></clr-label>
</div>
<app-stackblitz-example name="angular labels with badges" [componentTemplate]="htmlExample"></app-stackblitz-example>
