<button class="btn btn-sm btn-action btn-link" aria-haspopup="menu" (click)="onOpenMenu($event)">
  <cds-icon shape="ellipsis-vertical" class="btn-action-icon"></cds-icon>
  Actions
</button>

<appfx-menu #demoMenu>
  <appfx-menu-header [text]="'Actions'"></appfx-menu-header>
  <appfx-menu-action [text]="'Action 1'" (handle)="handleAction('Action 1')"></appfx-menu-action>
  <appfx-menu-action [text]="'Action 2'" (handle)="handleAction('Action 2')"></appfx-menu-action>
  <appfx-menu-separator></appfx-menu-separator>
  <appfx-menu [text]="'Submenu'">
    <appfx-menu-action [text]="'Nested Action'" (handle)="handleAction('Nested Action')"></appfx-menu-action>
  </appfx-menu>
</appfx-menu>

<menu-outlet></menu-outlet>
