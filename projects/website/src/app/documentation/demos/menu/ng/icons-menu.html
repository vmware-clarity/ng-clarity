<div
  class="menu-area"
  (contextmenu)="onContextMenu($event)"
  style="border: 1px dashed #ccc; padding: 2rem; min-height: 120px; text-align: center; cursor: context-menu"
>
  Right-click here
</div>

<appfx-menu #demoMenu>
  <appfx-menu-header [text]="'Actions'"></appfx-menu-header>
  <appfx-menu-action [text]="'Action with icon'" iconClass="books-icon" (handle)="handleAction('Action with icon')">
  </appfx-menu-action>
  <appfx-menu-action [text]="'Action 2'" (handle)="handleAction('Action 2')"></appfx-menu-action>
</appfx-menu>

<menu-outlet></menu-outlet>
