<clr-tree>
  <clr-tree-node [clrExpanded]="true">
    <cds-icon shape="building"></cds-icon>
    Datacenter

    <clr-tree-node [clrExpanded]="true">
      <button class="clr-treenode-link" (contextmenu)="onContextMenu($event)">
        <cds-icon shape="cluster"></cds-icon>
        Production Cluster
      </button>

      <clr-tree-node>
        <button class="clr-treenode-link" (contextmenu)="onContextMenu($event)">
          <cds-icon shape="host"></cds-icon>
          192.0.2.80
        </button>
      </clr-tree-node>

      <clr-tree-node>
        <button class="clr-treenode-link" (contextmenu)="onContextMenu($event)">
          <cds-icon shape="host"></cds-icon>
          192.0.2.81
        </button>
      </clr-tree-node>
    </clr-tree-node>
  </clr-tree-node>
</clr-tree>

<appfx-menu #demoMenu>
  <appfx-menu-header [text]="'Actions'"></appfx-menu-header>
  <appfx-menu-action [text]="'Action 1'" (handle)="handleAction('Action 1')"></appfx-menu-action>
  <appfx-menu-action [text]="'Action 2'" (handle)="handleAction('Action 2')"></appfx-menu-action>
  <appfx-menu-separator></appfx-menu-separator>
  <appfx-menu [text]="'Submenu'">
    <appfx-menu-action [text]="'Nested Action'" (handle)="handleAction('Nested Action')"></appfx-menu-action>
  </appfx-menu>
</appfx-menu>

<menu-outlet></menu-outlet>
