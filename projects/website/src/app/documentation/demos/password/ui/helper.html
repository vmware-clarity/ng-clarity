<form class="clr-form clr-form-horizontal">
  <div class="clr-form-control">
    <label for="ui-helper" class="clr-control-label">Password</label>
    <div class="clr-control-container">
      <div class="clr-input-wrapper">
        <input
          type="password"
          autocomplete="current-password"
          id="ui-helper"
          placeholder="Password please!"
          class="clr-input"
        />
      </div>
      <div class="clr-subtext-wrapper error">
        <cds-icon class="clr-validate-icon" shape="error-standard" status="danger"></cds-icon>
        <span class="clr-subtext">Must contain at least 8 characters!</span>
      </div>
    </div>
  </div>
</form>
