<form class="clr-form clr-form-horizontal">
  <div class="clr-form-control">
    <label for="textarea-error" class="clr-control-label">Description</label>
    <div class="clr-control-container clr-error">
      <div class="clr-textarea-wrapper">
        <textarea id="textarea-error" class="clr-textarea"></textarea>
      </div>
      <div class="clr-subtext-wrapper">
        <cds-icon class="clr-validate-icon" shape="error-standard" status="danger"></cds-icon>

      </div>
    </div>
  </div>
