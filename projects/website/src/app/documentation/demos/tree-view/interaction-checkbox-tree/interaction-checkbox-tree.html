<clr-tree>
  @for (group of userPriveleges; track group) {
  <clr-tree-node [(clrSelected)]="group.selected" [clrExpanded]="true">
    {{ group.name }} @for (item of group.items; track item) {
    <clr-tree-node [(clrSelected)]="item.selected">
      {{ item.name }} @for (innerItem of item.items; track innerItem) {
      <clr-tree-node [(clrSelected)]="innerItem.selected"> {{ innerItem.name }} </clr-tree-node>
      }
    </clr-tree-node>
    }
  </clr-tree-node>
  }
</clr-tree>
