<clr-tree [clrLazy]="true">
  @for (group of groceries$ | async; track group) {
  <clr-tree-node [(clrSelected)]="group.selected">
    {{ group.name }}
    <ng-template clrIfExpanded>
      <my-grocery-items [group]="group"></my-grocery-items>
    </ng-template>
  </clr-tree-node>
  }
</clr-tree>

<app-stackblitz-example
  name="lazy loading selection tree"
  [componentTemplate]="exampleHtml"
  [componentClass]="exampleTs"
  [additionalFiles]="additionalFiles"
></app-stackblitz-example>
