<clr-tree>
  <clr-tree-node [clrExpanded]="true">
    Permissions @for (permission of permissions; track permission) {
    <clr-tree-node [(clrExpanded)]="permission.expanded">
      {{ permission.type }} @for (right of permission.rights; track right) {
      <clr-tree-node [(clrSelected)]="right.enable"> {{ right.name }} </clr-tree-node>
      }
    </clr-tree-node>
    }
  </clr-tree-node>
</clr-tree>
