@if (number) {
  <div class="color-example-item-number">{{ number }}</div>
}
@if (token) {
  <button
    class="color-example-item-button"
    [attr.aria-label]="'Copy ' + text + ' ' + tokenType() + ' token to clipboard'"
    [ngClass]="{ 'color-example-item-button--copied': copied }"
    [ngStyle]="{
      'border-color': borderColor ? 'var(' + borderColor + ')' : '',
      '--color': tokenType() === 'color' ? (token | cssVariable) : null,
      '--box-shadow': tokenType() === 'shadow' ? (token | cssVariable) : null,
    }"
    (click)="copyTokenToClipboard()"
  >
    @if (copied) {
      <span cds-text="caption">Copied!</span>
    }
  </button>
}
<div class="color-example-item-text">
  @if (text) {
    {{ text }}
  } @else {
    <ng-content></ng-content>
  }
</div>
